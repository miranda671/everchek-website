<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon-32.png" sizes="32x32">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Thank You | EverChek</title>
  <link rel="canonical" href="https://ever-chek.com/thank-you.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Thank You | EverChek - CGM Manufacturing Partner" />
  <meta property="og:description" content="Thank you for contacting EverChek. Our team will review your message and get back to you within 1-2 business days." />
  <meta property="og:url" content="https://ever-chek.com/thank-you.html" />
  <meta property="og:image" content="https://ever-chek.com/everchek-logo.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="stylesheet" href="site.css">
  <style>
    .thankyou-section {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 160px 24px 100px;
    }
    .thankyou-inner {
      max-width: 560px;
    }
    .thankyou-inner h1 {
      font-size: 40px;
      font-weight: 700;
      color: var(--brand-black);
      margin-bottom: 16px;
      letter-spacing: -0.8px;
    }
    .thankyou-inner p {
      font-size: 17px;
      color: var(--brand-gray);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .check-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(128,188,226,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .check-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--brand-blue);
      fill: none;
      stroke-width: 2.5;
    }
    @media (max-width: 640px) {
      .thankyou-inner h1 { font-size: 28px; }
      .thankyou-section { padding: 140px 20px 80px; }
    }
  </style>
  <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "EverChek",
  "url": "https://ever-chek.com/thank-you.html",
  "description": "Thank you for contacting EverChek. Our team will review your message and get back to you within 1-2 business days.",
  "publisher": {
    "@type": "Organization",
    "name": "EverChek",
    "url": "https://ever-chek.com",
    "logo": {
      "@type": "ImageObject",
      "url": "https://ever-chek.com/everchek-logo.png"
    }
  }
}
</script>
</head>
<body>
  <div id="nav-placeholder"></div>
  <section class="thankyou-section">
    <div class="thankyou-inner">
      <div class="check-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1>Thank You</h1>
      <p>Your message has been received. Our team will review it and get back to you within 1&ndash;2 business days.</p>
      <a href="index.html" class="btn btn-primary">Back to Home</a>
    </div>
  </section>
  <div id="footer-placeholder"></div>
  <script src="site.js"></script>
</body>
</html>
